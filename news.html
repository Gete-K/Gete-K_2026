<!doctype html>
<html lang="ja" data-title-prefix="お知らせ">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>お知らせ｜劇団〇〇</title>
  <meta name="description" content="劇団〇〇のお知らせ一覧。" />
  <meta name="theme-color" content="#f7f1e7" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <a class="skip" href="#main">本文へスキップ</a>

  <header class="header" data-header>
    <div class="container header__inner">
      <a class="brand" href="./index.html#top" aria-label="トップへ戻る">
        <img class="brand__mark" src="" alt="" hidden />
        <span class="brand__text">
          <span class="brand__jp">劇団〇〇</span>
          <span class="brand__en">GEKIDAN XX</span>
        </span>
      </a>

      <nav class="nav" aria-label="グローバルナビゲーション">
        <a href="./index.html#about">劇団について</a>
        <a href="./index.html#show">次回公演</a>
        <a href="./index.html#past">過去公演</a>
        <a href="./index.html#follow">SNS</a>
        <a href="./index.html#contact" class="nav__cta">お問い合わせ</a>
      </nav>

      <button class="navToggle" id="navToggle" aria-expanded="false" aria-controls="navDrawer">
        メニュー
      </button>
    </div>
  </header>

  <div class="drawer" id="navDrawer" hidden>
    <div class="drawer__backdrop" data-close-drawer></div>
    <div class="drawer__panel" role="dialog" aria-modal="true" aria-label="メニュー">
      <div class="drawer__head">
        <div class="drawer__title">MENU</div>
        <button class="drawer__close" data-close-drawer aria-label="メニューを閉じる">×</button>
      </div>
      <div class="drawer__links">
        <a href="./index.html#about">劇団について</a>
        <a href="./index.html#show">次回公演</a>
        <a href="./index.html#past">過去公演</a>
        <a href="./index.html#follow">SNS</a>
        <a href="./index.html#contact" class="drawer__cta">お問い合わせ</a>
      </div>
      <div class="drawer__foot">
        <small>© 2026 Gekidan XX</small>
      </div>
    </div>
  </div>

  <main id="main">
    <section class="pageHero">
      <div class="container">
        <p class="section__eyebrow">NEWS</p>
        <h1 class="pageHero__title">お知らせ</h1>
        <p class="section__sub">content/site.def の news.* を増やすと、このページにはすべて表示されます。</p>
      </div>
    </section>

    <!--
      data-limit を付けていないので、お知らせ一覧では全件を表示します。
      トップページ側だけ data-limit="3" で最新3件にしています。
    -->
    <section class="section" id="news">
      <div class="container">
        <div class="grid grid--3 newsGrid">
          <article class="card card--hover">
            <p class="news__date">2026.03.01</p>
            <h3 class="card__title">次回公演の情報を公開しました</h3>
            <p class="card__text">予約開始日・会場などを更新しました。</p>
          </article>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container footer__inner">
        <div>
          <div class="footer__brand">劇団〇〇</div>
          <div class="footer__small">© 2026 Gekidan XX. All rights reserved.</div>
        </div>
        <a class="textLink" href="./index.html#top">トップへ戻る</a>
      </div>
    </footer>
  </main>

  <script src="./main.js"></script>
</body>
</html>
